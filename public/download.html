<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargando Folleto | LegalContigo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f4f3;
            color: #1c2424;
            text-align: center;
        }
        .card {
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 16px 32px rgba(0, 57, 62, 0.1);
            max-width: 90%;
            width: 340px;
            border: 1px solid rgba(0, 57, 62, 0.05);
        }
        h2 {
            color: #00393E;
            margin-top: 0;
            margin-bottom: 0.5rem;
        }
        p {
            color: #5e6b6b;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #d4af37 0%, #aa8529 100%);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 8px 16px rgba(212, 175, 55, 0.25);
            transition: transform 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .logo {
            width: 80px;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="/imagotipo.png" alt="LegalContigo" class="logo">
        <h2>Descargando...</h2>
        <p>Tu folleto se descargará en unos segundos. Si no ocurre automáticamente, utiliza el botón debajo.</p>
        <a href="/FOLLETO.png" download="Folleto_LegalContigo.png" class="btn" id="downloadBtn">Descargar Folleto Manualmente</a>
    </div>

    <script>
        // Timeout breve para asegurar que la página renderizó antes del prompt de descarga
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('downloadBtn').click();
            }, 800);
        };
    </script>
</body>
</html>
